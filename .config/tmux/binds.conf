# keybindings for nested tmux sessions
bind-key -n c-g send-prefix
bind-key -n c-t send-keys c-g

# Bind a to source tmux
bind a source-file ~/.config/tmux/tmux.conf

bind r command-prompt -I "#W" "rename-window -- '%%'"

# Bind ctrl + b, ctrl + c to use break-pane
# and open current pane in another window
bind C-c break-pane -d

# Bind ctrl + b, S to create a new session
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"

# Bind ctrl + b, d to detach from session
bind d detach-client

# Open panes in the same directory as the current pane
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# bind ctrl + b, S-Left or S-Right
# Move window to the left or right
bind-key S-Left swap-window -t -1 \; select-window -t -1
bind-key S-Right swap-window -t +1 \; select-window -t +1

# bind prefix+o → select next pane AND zoom it
unbind o
bind o select-pane -t :.+ \; resize-pane -Z

# bind prefix+x → kill the current pane without the y/n prompt
unbind x
bind x kill-pane

# Enter copy mode
bind-key [ copy-mode

# Jump up and down 10 lines in copy mode (User0=Ctrl+Shift+Up, User1=Ctrl+Shift+Down)
bind-key -T copy-mode User0 send-keys -X -N 10 cursor-up
bind-key -T copy-mode User1 send-keys -X -N 10 cursor-down

bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Navigate between words in copy mode
bind-key -T copy-mode C-Left send-keys -X previous-word
bind-key -T copy-mode C-Right send-keys -X next-word

# Toggleable single-purpose panes (create on first press, hide on second,
# auto-destroy when the inner command exits).
bind i run-shell "tmux-pane-toggle lazygit lazygit"
bind b run-shell "tmux-pane-toggle btop btop"
bind e run-shell "tmux-pane-toggle editor '$EDITOR .'"
bind v run-shell "tmux-pane-toggle nvim 'nvim .'"
bind t run-shell "tmux-pane-toggle claude-session-viewer 'claude-show-session | LESS=\"-R +G\" less'"
