[theme]
name = "catppuccin"

[theme.custom]
overlay0 = "#9399b2"
overlay1 = "#a6adc8"
subtext0 = "#bac2de"

[terminal]
default_shell = "/run/current-system/sw/bin/bash"
shell_mode = "login"
new_cwd = "follow"

[ui]
mouse_capture = true
accent = "cyan"
sidebar_collapsed = true
confirm_close = false
prompt_new_tab_name = false

[keys]
prefix = "ctrl+b"
reload_config = "prefix+a"
detach = "prefix+d"
settings = "prefix+w"
new_tab = "prefix+c"
rename_tab = "prefix+r"
close_tab = "prefix+&"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
new_workspace = "prefix+shift+s"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
workspace_picker = "prefix+g"
goto = "prefix+s"
switch_workspace = "prefix+shift+1..9"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+shift+r"
focus_pane_left = "prefix+left"
focus_pane_down = "prefix+down"
focus_pane_up = "prefix+up"
focus_pane_right = "prefix+right"
cycle_pane_next = "prefix+o"
cycle_pane_previous = "prefix+shift+o"
split_vertical = "prefix+%"
split_horizontal = 'prefix+"'
edit_scrollback = "prefix+["
toggle_sidebar = "prefix+shift+b"

[[keys.command]]
key = "prefix+i"
type = "pane"
command = "lazygit"

[[keys.command]]
key = "prefix+b"
type = "pane"
command = "btop"

[[keys.command]]
key = "prefix+e"
type = "pane"
command = "code . -n"

[[keys.command]]
key = "prefix+v"
type = "pane"
command = "nvim ."

[[keys.command]]
key = "prefix+t"
type = "pane"
command = "bash -c 'claude-show-session | LESS=\"-R +G\" less'"

[[keys.command]]
key = "prefix+ctrl+c"
type = "shell"
command = "$HERDR_BIN_PATH pane move $HERDR_ACTIVE_PANE_ID --new-tab --no-focus"

[[keys.command]]
key = "prefix+shift+c"
type = "shell"
command = "$HERDR_BIN_PATH pane move $HERDR_ACTIVE_PANE_ID --new-workspace"

[[keys.command]]
key = "ctrl+g"
type = "shell"
command = "$HERDR_BIN_PATH pane send-keys $HERDR_ACTIVE_PANE_ID ctrl+b"

[experimental]
allow_nested = true
