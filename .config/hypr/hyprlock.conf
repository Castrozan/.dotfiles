source = ~/.config/hypr-theme/current/theme/hyprlock.conf

general {
    hide_cursor = true
    ignore_empty_input = true
    text_trim = true
}

animations {
    enabled = true
    bezier = fadeSmooth, 0.05, 0.9, 0.1, 1.0
    animation = fadeIn, 1, 4, fadeSmooth
    animation = fadeOut, 1, 4, fadeSmooth
    animation = inputFieldDots, 1, 2, fadeSmooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.015
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

shape {
    monitor =
    size = 400, 350
    color = $background_color
    rounding = 24
    border_size = 1
    border_color = $background_border
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $foreground_color
    font_size = 72
    font_family = FiraCode Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $foreground_dimmed
    font_size = 18
    font_family = FiraCode Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, $USER
    color = $foreground_subtle
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_center = true
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = $input_outline
    inner_color = $input_background
    font_color = $foreground_color
    check_color = $accent_color
    fail_color = $fail_color
    fade_on_empty = true
    fade_timeout = 3000
    placeholder_text = <i>Type to unlock...</i>
    hide_input = false
    rounding = 15
    position = 0, -60
    halign = center
    valign = center
}
