# Minimal Hyprland config - just enough to work

monitor = ,preferred,auto,1

input {
    kb_layout = br
}

general {
    border_size = 2
    gaps_in = 5
    gaps_out = 10
}

bind = SUPER, Return, exec, wezterm
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
