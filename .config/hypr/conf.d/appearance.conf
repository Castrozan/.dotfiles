# Appearance: colors, decorations, animations, layouts

# Cursor theme
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic

# Border colors
$activeBorderColor = rgba(8ee0d4ee) rgba(e69ea8ee) 45deg
$inactiveBorderColor = rgba(1e1e1eaa)

general {
    gaps_in = 5
    gaps_out = 4 10 10 10
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    resize_on_border = false
    allow_tearing = false
    layout = scrolling
    no_focus_fallback = true
}

scrolling {
    column_width = 1.0
    fullscreen_on_one_column = true
    focus_fit_method = 1
    follow_focus = true
    direction = right
}

decoration {
    rounding = 12
    shadow {
        enabled = false
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 10
        passes = 1
        special = true
        brightness = 0.85
        contrast = 0.90
    }
    dim_inactive = true
    dim_strength = 0.2
}

animations {
    enabled = yes, please :)
    bezier = md3_standard, 0.2, 0.0, 0, 1.0
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = soft, 0.5, 0, 0.25, 1

    animation = windowsIn, 1, 4, md3_decel, popin 60%
    animation = windowsOut, 1, 4, md3_accel, popin 60%
    animation = windowsMove, 1, 4, md3_standard
    animation = fade, 1, 3, soft
    animation = border, 1, 10, md3_standard
    animation = borderangle, 1, 30, fluent_decel, loop
    animation = workspaces, 1, 4, md3_decel, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    layers_hog_keyboard_focus = false
    on_focus_under_fullscreen = 1
    vrr = 1
    disable_autoreload = true
}

cursor {
    hide_on_key_press = true
    no_warps = true
    min_refresh_rate = 165
}

binds {
    movefocus_cycles_fullscreen = 2
}
