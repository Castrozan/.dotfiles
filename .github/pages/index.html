<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dotfiles reports</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0; padding: 3rem 2rem;
         background: #0d1117; color: #e6edf3; }
  h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
  .subtitle { color: #8b949e; margin: 0 0 2rem; }
  ul { list-style: none; padding: 0; max-width: 640px; }
  li { margin: 0 0 1rem; }
  a.card { display: block; padding: 1rem 1.25rem; background: #161b22; border: 1px solid #30363d;
           border-radius: 8px; text-decoration: none; color: #58a6ff; font-size: 1.1rem; }
  a.card:hover { border-color: #58a6ff; }
  a.card span { display: block; color: #8b949e; font-size: .85rem; margin-top: .35rem; }
</style>
</head>
<body>
<h1>dotfiles reports</h1>
<p class="subtitle">Auto-generated on every push to <code>main</code>.</p>
<ul>
<li><a class="card" href="./baseline/">agent-eval baseline pass rate
  <span>Tier-1 static-eval compliance over time, from the git history of baseline.json</span></a></li>
<li><a class="card" href="./coverage/">bash test coverage
  <span>kcov line coverage for the shell test suite</span></a></li>
