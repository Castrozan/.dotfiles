name: pages
on:
  push:
    branches: [main]
    paths:
      - "agents/evals/baseline.json"
      - "agents/evals/render_baseline_dashboard.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render baseline dashboard
        run: python3 agents/evals/render_baseline_dashboard.py site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
