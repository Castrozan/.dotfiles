name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: cachix/install-nix-action@v31

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build coverage report
        run: |
          find home/base home/linux home/darwin -path "*/scripts/*" -type f -exec chmod +x {} +
          nix shell nixpkgs#kcov nixpkgs#bats nixpkgs#bc --command ./tests/cover/bash-coverage.sh --ci

      - name: Assemble site
        run: |
          mkdir -p site
          cp .github/pages/index.html site/index.html
          cp -r tests/coverage site/coverage
          python3 agents/evals/render_baseline_dashboard.py site/baseline

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
