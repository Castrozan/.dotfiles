name: deploy reports

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: reports-deploy
  cancel-in-progress: true

env:
  GCP_PROJECT: zg-url-shortener-2026

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - uses: cachix/install-nix-action@v31

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build coverage report
        run: |
          find home/base home/linux home/darwin -path "*/scripts/*" -type f -exec chmod +x {} +
          nix shell nixpkgs#kcov nixpkgs#bats nixpkgs#bc --command ./tests/cover/bash-coverage.sh --ci

      - name: Assemble static site
        run: |
          mkdir -p apps/reports/site/quality
          cp .github/pages/style.css apps/reports/site/style.css
          cp .github/pages/index.html apps/reports/site/index.html
          cp .github/pages/quality.html apps/reports/site/quality/index.html
          cp -r tests/coverage apps/reports/site/coverage
          python3 agents/evals/render_baseline_dashboard.py apps/reports/site/baseline

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/933601426694/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: dotfiles-github-deployer@zg-url-shortener-2026.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Publish baseline and coverage to the usage snapshots bucket
        if: ${{ vars.REPORTS_STATIC_GCS_PUBLISH == 'true' }}
        run: |
          BUCKET="gs://${GCP_PROJECT}-dotfiles-usage-snapshots"
          gcloud storage rsync apps/reports/site/baseline "${BUCKET}/reports/baseline" \
            --recursive --delete-unmatched-destination-objects
          gcloud storage rsync apps/reports/site/coverage "${BUCKET}/reports/coverage" \
            --recursive --delete-unmatched-destination-objects
