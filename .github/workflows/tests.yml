name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quick-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run quick tests
        run: ./tests/run.sh --ci

  qml-and-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run Python tests
        run: |
          nix shell nixpkgs#python312Packages.pytest --command \
            pytest home/modules/hyprland/tests/test_*.py -x -q

      - name: Run QML unit tests
        run: |
          nix shell nixpkgs#qt6.qtdeclarative --command bash -c '
            export QT_DECLARATIVE_PATH=$(dirname $(dirname $(which qmltestrunner)))
            bash home/modules/hyprland/tests/qml/run-qml-tests.sh
          '
