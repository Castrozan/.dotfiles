name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quick-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run quick tests
        run: ./tests/run.sh --ci

  qml-and-python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run Python tests
        run: |
          nix shell --impure --expr 'let pkgs = (builtins.getFlake "nixpkgs").legacyPackages.${builtins.currentSystem}; in import ./home/base/testing/python-test-environment.nix { inherit pkgs; }' --command bash -c '
            export REPO_DIR="$PWD"
            source tests/lib/pytest.sh
            pytest $(_collect_pytest_test_files_in_tier_directory unit) -x -q
          '

      - name: Run QML unit tests
        run: |
          nix shell nixpkgs#qt6.qtdeclarative --command bash -c '
            export QT_DECLARATIVE_PATH=$(dirname $(dirname $(which qmltestrunner)))
            bash home/linux/hyprland/tests/qml/run-qml-tests.sh
          '
