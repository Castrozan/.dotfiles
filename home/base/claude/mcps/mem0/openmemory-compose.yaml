services:
  mem0_store:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - mem0_storage:/qdrant/storage

  openmemory-mcp:
    image: mem0/openmemory-mcp
    restart: unless-stopped
    depends_on:
      - mem0_store
    ports:
      - "8765:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USER=lucas
      - OPENAI_API_KEY=ollama-local-no-paid-key
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1

volumes:
  mem0_storage:
