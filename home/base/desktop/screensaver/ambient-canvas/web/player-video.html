<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ambient-canvas-gpu-screensaver</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a1a2f;
        overflow: hidden;
      }
      #ambient-canvas-loop {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        background: #0a1a2f;
      }
    </style>
  </head>
  <body>
    <video
      id="ambient-canvas-loop"
      autoplay
      muted
      playsinline
      disablepictureinpicture
    ></video>
    <script>
      (function playAmbientCanvasLoop() {
        const loopVideoElement = document.getElementById("ambient-canvas-loop");
        const requestedSource = new URLSearchParams(
          window.location.search,
        ).get("src");
        if (!requestedSource) {
          return;
        }
        loopVideoElement.src = requestedSource;
        function restartFromStart() {
          loopVideoElement.currentTime = 0;
          const playbackAttempt = loopVideoElement.play();
          if (playbackAttempt && typeof playbackAttempt.catch === "function") {
            playbackAttempt.catch(function retryShortly() {
              window.setTimeout(restartFromStart, 500);
            });
          }
        }
        loopVideoElement.addEventListener("ended", restartFromStart);
        loopVideoElement.addEventListener("error", function retryLater() {
          window.setTimeout(restartFromStart, 1000);
        });
        restartFromStart();
      })();
    </script>
  </body>
</html>
