name: arr-stack

x-arr-common-environment: &arr-common-environment
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

networks:
  arrnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:4.6.7
    container_name: arr-qbittorrent
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:8080:8080"
    environment:
      <<: *arr-common-environment
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - ${ARR_CONFIG_ROOT}/qbittorrent:/config
      - ${ARR_DATA_ROOT}:/data

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls151@sha256:3950b5e48cf4ba9dab78fe14038dd7f062e66b7b4ab368b02c94a13f6a3dae9f
    container_name: arr-prowlarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:9696:9696"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/prowlarr:/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.19.2979-ls316@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
    container_name: arr-sonarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:8989:8989"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/sonarr:/config
      - ${ARR_DATA_ROOT}:/data

  radarr:
    image: lscr.io/linuxserver/radarr:6.2.1.10461-ls308@sha256:39da107b5a9371fdaa651bd188049b863716a815385eb3a30d41071b7e1aeb33
    container_name: arr-radarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:7878:7878"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/radarr:/config
      - ${ARR_DATA_ROOT}:/data

  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0.4875-ls32@sha256:4ac390131993f3104a43c4abed79b8abd3227e2536f7b468877e5f41d9f54da4
    container_name: arr-lidarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:8686:8686"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/lidarr:/config
      - ${ARR_DATA_ROOT}:/data

  readarr:
    image: lscr.io/linuxserver/readarr:0.4.18-develop
    container_name: arr-readarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:8788:8787"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/readarr:/config
      - ${ARR_DATA_ROOT}:/data

  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls352@sha256:aaaa087af75a73b7ac765dcc5d748874cfafdb93c23ec9f64fbb481dea291b23
    container_name: arr-bazarr
    restart: "no"
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:6767:6767"
    environment:
      <<: *arr-common-environment
    volumes:
      - ${ARR_CONFIG_ROOT}/bazarr:/config
      - ${ARR_DATA_ROOT}:/data

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.11ubu2404-ls39@sha256:96d21c396f46f10578931c2941e3f2789f7087b5ab0e166afedf29e7385c6aa7
    container_name: arr-jellyfin
    restart: unless-stopped
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:8096:8096"
      - "127.0.0.1:8096:8096"
    environment:
      <<: *arr-common-environment
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ${ARR_CONFIG_ROOT}/jellyfin:/config
      - ${ARR_DATA_ROOT}/media:/media:ro

  jellyseerr:
    image: fallenbagel/jellyseerr:2.7.3@sha256:4538137bc5af902dece165f2bf73776d9cf4eafb6dd714670724af8f3eb77764
    container_name: arr-jellyseerr
    restart: unless-stopped
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:5055:5055"
      - "127.0.0.1:5055:5055"
    environment:
      <<: *arr-common-environment
      LOG_LEVEL: "info"
    volumes:
      - ${ARR_CONFIG_ROOT}/jellyseerr:/app/config

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    container_name: arr-homepage
    restart: unless-stopped
    networks:
      - arrnet
    ports:
      - "${ARR_BIND_ADDR:?set in ~/arr-stack/.env}:80:3000"
    environment:
      <<: *arr-common-environment
      HOMEPAGE_ALLOWED_HOSTS: "${ARR_ALLOWED_HOSTS}"
      HOMEPAGE_VAR_ARR_HOST: "${ARR_DASHBOARD_HOST}"
    volumes:
      - ${ARR_CONFIG_ROOT}/homepage:/app/config
