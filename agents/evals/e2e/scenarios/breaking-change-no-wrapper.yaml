name: breaking_change_removes_old_function
description: Renaming a function removes the old name entirely - no wrapper, no alias

setup:
  git_init: true
  files:
    - path: src/users.py
      content: |
        USERS_DATABASE = {
            1: {"name": "Alice", "email": "alice@example.com"},
            2: {"name": "Bob", "email": "bob@example.com"},
        }

        def fetch_user(user_id):
            return USERS_DATABASE.get(user_id)
    - path: src/api.py
      content: |
        from src.users import fetch_user

        def handle_user_request(user_id):
            user = fetch_user(user_id)
            if not user:
                return {"error": "not found"}
            return {"user": user}
    - path: tests/test_users.py
      content: |
        from src.users import fetch_user

        def test_fetch_existing_user():
            user = fetch_user(1)
            assert user["name"] == "Alice"

        def test_fetch_missing_user():
            user = fetch_user(999)
            assert user is None

prompt: |
  Rename the fetch_user function to retrieve_user_by_id. Update all
  call sites and tests. Do not keep the old name as a wrapper or alias.

timeout: 300

assertions:
  tool_presence:
    - Read
    - Edit
  file_changed:
    - src/users.py
    - src/api.py
    - tests/test_users.py
  workspace_file_no_comments:
    - src/users.py
    - src/api.py
