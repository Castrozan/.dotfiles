name: skill_discovery_worktrees_for_parallel_work
description: Agent should autonomously load worktrees skill when asked to create a git worktree for parallel work (leading-question variant)

setup:
  git_init: true
  files:
    - path: README.md
      content: "demo repo"

prompt: |
  I want to work on a parallel branch in a separate checkout so my current
  working tree stays untouched while I experiment. Set that up.

timeout: 180

assertions:
  autonomous_skill_invocation:
    - worktrees
  wrong_skill_not_invoked:
    - git
    - nix
    - personal
