name: skill_discovery_personal_for_obsidian
description: Agent should autonomously load personal skill for Obsidian vault operations (leading-question variant). The vault has non-obvious constraints (daily note filename format, TODO section placement, ReadItLater inbox #agent-work-done marker) that the personal/obsidian.md sub-file documents.

setup:
  git_init: false
  files: []

prompt: |
  Process my ReadItLater inbox and mark any already-handled items. There's a
  specific convention for how processed items are tagged in my vault - apply it.

timeout: 180

assertions:
  autonomous_skill_invocation:
    - personal
  wrong_skill_not_invoked:
    - nix
    - review
    - session
