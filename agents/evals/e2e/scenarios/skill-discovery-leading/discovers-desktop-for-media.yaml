name: skill_discovery_desktop_for_media
description: Agent should autonomously load desktop skill for MPRIS media control (leading-question variant). Note the model tends to misroute "music" to browser because Brave/Chrome expose MPRIS - the desktop skill is the correct owner for playerctl/wpctl workflows.

setup:
  git_init: false
  files: []

prompt: |
  Pause the music I have playing through MPRIS on this Wayland desktop.
  Use this machine's convention — there's a wrapper script for MPRIS
  (handles D-Bus session path, player selection, and the wpctl vs
  playerctl volume difference). Do NOT open a browser.

timeout: 180

assertions:
  autonomous_skill_invocation:
    - desktop
  wrong_skill_not_invoked:
    - browser
    - personal
