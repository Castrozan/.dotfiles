name: skill_discovery_test_for_bug_report
description: Agent should autonomously load test skill for bug reports (leading-question variant). The test skill defines the test-first/double-test/pre-delivery protocol this project uses - not obvious from a raw bug description.

setup:
  git_init: true
  files:
    - path: calculator.py
      content: |
        def divide_numbers(numerator, denominator):
            return numerator / denominator
    - path: test_calculator.py
      content: |
        from calculator import divide_numbers

        def test_divide_basic():
            assert divide_numbers(6, 3) == 2

prompt: |
  Bug report: divide_numbers(10, 0) crashes with ZeroDivisionError instead of
  returning a sensible value. Before touching the source, follow this project's
  testing protocol — what does it require for bug reports, and how many test
  passes are needed to confirm stability?

timeout: 240

assertions:
  autonomous_skill_invocation:
    - test
  wrong_skill_not_invoked:
    - review
    - session
    - personal
  file_changed:
    - test_calculator.py
    - calculator.py
