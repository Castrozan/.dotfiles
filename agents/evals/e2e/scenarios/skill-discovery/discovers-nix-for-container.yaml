name: skill_discovery_nix_for_container
description: Agent should autonomously load the nix skill (which now owns docker.md) for container inspection

setup:
  git_init: false
  files: []

prompt: |
  The postgres container on this host keeps restarting. Inspect its state,
  check the logs, and tell me what is going wrong.

timeout: 180

assertions:
  autonomous_skill_invocation:
    - nix
  wrong_skill_not_invoked:
    - session
    - personal
