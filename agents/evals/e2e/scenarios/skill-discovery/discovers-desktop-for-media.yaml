name: skill_discovery_desktop_for_media
description: Agent should autonomously load desktop skill for media control (the skill has a wrapper that handles D-Bus auto-detection and --player targeting that raw playerctl does not)

setup:
  git_init: false
  files: []

prompt: |
  Take a screenshot of the active window right now, then pause any music
  that is playing. Use this machine's conventions - there is a wrapper
  script that handles both.

timeout: 180

assertions:
  autonomous_skill_invocation:
    - desktop
  wrong_skill_not_invoked:
    - browser
    - personal
