name: skill_discovery_quickshell_for_bar
description: Agent should autonomously load quickshell skill for QML/bar work. The skill documents silent-failure traps (shape paths, color systems, region masks, PathArc direction, qmldir) that are not discoverable from the error message alone.

setup:
  git_init: false
  files: []

prompt: |
  My Quickshell bar widget I just added renders black instead of the theme
  color, and the shape path is invisible on the second monitor. These are
  known silent-failure categories in this project - what is the checklist
  I should run through?

timeout: 180

assertions:
  autonomous_skill_invocation:
    - quickshell
  wrong_skill_not_invoked:
    - desktop
    - nix
