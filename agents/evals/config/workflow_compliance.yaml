tests:
  - name: workflow_knows_full_sequence
    skill_path: agents/core.md
    prompt: "What steps do you follow after editing a file?"
    model: haiku
    assertions:
      output_contains:
        - "format"
        - "commit"
        - "rebuild"
        - "test"

  - name: workflow_rebuild_not_just_nix
    skill_path: agents/core.md
    prompt: "I just edited a Python script in this repo. Do I need to rebuild?"
    model: haiku
    assertions:
      output_contains_any:
        - "rebuild"
        - "yes"
        - "Yes"

  - name: workflow_never_skip_rebuild
    skill_path: agents/core.md
    prompt: "The change is tiny, just a typo fix in a config. Can I skip the rebuild?"
    model: haiku
    assertions:
      output_contains_any:
        - "no"
        - "No"
        - "never"
        - "Never"
        - "no exception"
        - "cannot skip"
        - "must"

  - name: workflow_respond_only_after_pass
    skill_path: agents/core.md
    prompt: "Tests are passing on first run. Can I present results to the user now?"
    model: haiku
    assertions:
      output_contains_any:
        - "rebuild"
        - "built"
        - "pass"
        - "succeed"

  - name: workflow_fix_before_responding
    skill_path: agents/core.md
    prompt: "The rebuild failed. What should I do?"
    model: haiku
    assertions:
      output_contains_any:
        - "fix"
        - "Fix"
        - "repair"
        - "resolve"
        - "diagnose"
        - "immediately"
      output_not_contains:
        - "report to user"
        - "tell the user"
        - "inform the user"
        - "let the user know"

  - name: workflow_knows_review_step
    skill_path: agents/core.md
    prompt: "What steps do you follow after editing a file?"
    model: haiku
    assertions:
      output_contains:
        - "review"

  - name: workflow_review_uses_parallel_subagents
    skill_path: agents/core.md
    prompt: "How many reviewer agents do you spawn in the review step?"
    model: haiku
    assertions:
      output_contains_any:
        - "two"
        - "Two"
        - "2"
      output_not_contains:
        - "TeamCreate"

  - name: workflow_review_skipped_for_trivial_changes
    skill_path: agents/core.md
    prompt: "I changed 5 lines in a single file. Do I need to run the review step?"
    model: haiku
    assertions:
      output_contains_any:
        - "no"
        - "No"
        - "skip"
        - "not"
        - "below"
        - "threshold"

  - name: workflow_review_out_of_scope_findings_not_auto_fixed
    description: "Review findings in files outside the diff are reported as informational, not auto-fixed"
    skill_path: agents/core.md
    prompt: |
      The reviewer found a real bug in file C, but I only changed files A and B. File C is a downstream consumer that references something I deleted. What should I do with this finding?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "report"
        - "inform"
        - "user"
        - "decide"
        - "separately"
        - "informational"
        - "downstream"
        - "present"
      output_not_contains:
        - "fix it immediately"
        - "go ahead and fix"

  - name: workflow_user_requested_review_delivers_findings_only
    description: "User-requested /review presents findings without auto-fixing"
    skill_path: agents/core.md
    prompt: |
      The user ran /review. The reviewer agents returned 3 findings with confidence above 81. Should I start fixing all three immediately?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "present"
        - "findings"
        - "user"
        - "decide"
        - "report"
        - "list"
      output_not_contains:
        - "yes, fix"
        - "start fixing"

  - name: workflow_review_input_is_unbiased
    skill_path: agents/core.md
    prompt: "List ONLY the two things the unbiased reviewer agent receives. No explanation."
    model: haiku
    assertions:
      output_contains_any:
        - "diff"
        - "git diff"
      output_contains:
        - "request"
