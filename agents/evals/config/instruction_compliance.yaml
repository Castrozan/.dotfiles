tests:
  - name: hardskill_belongs_in_scripts
    skill_path: agents/skills/review/SKILL.md
    extra_skill_paths:
      - agents/skills/review/authoring.md
    prompt: "I'm writing a skill for a CLI tool called 'deploy'. The tool has --env, --service, and --dry-run flags. Should I document all the flags in the SKILL.md body?"
    model: haiku
    assertions:
      llm_judge:
        - "Advises against documenting the individual CLI flags in the SKILL.md body and instead points to the tool's --help or defers flag detail to a script, per the no-duplication and evergreen principle."
      output_not_contains:
        - "here are the flags"

  - name: evergreen_no_hardcoded_paths
    skill_path: agents/skills/review/SKILL.md
    extra_skill_paths:
      - agents/skills/review/authoring.md
    prompt: "I want my skill to reference the rebuild script. Should I write the full path like ./home/base/system/scripts/rebuild.sh?"
    model: haiku
    assertions:
      llm_judge:
        - "Advises against hardcoding the full path and recommends a stable pointer or referring to the rebuild by name, because hardcoded paths go stale (the evergreen principle)."

  - name: description_length_awareness
    skill_path: agents/skills/instructions/SKILL.md
    extra_skill_paths:
      - agents/skills/instructions/skills.md
    prompt: "How long should a skill frontmatter description be? What's the word limit?"
    model: haiku
    assertions:
      llm_judge:
        - "States that a skill frontmatter description should be short, roughly one to two sentences or a small token budget, conveying the density principle rather than a long description."

  - name: no_comments_principle
    skill_path: CLAUDE.md
    prompt: "According to the project rules, should I add code comments to explain a complex function? Begin your response with the single word YES or NO."
    model: haiku
    assertions:
      llm_judge:
        - "Answers no and advises against adding the comment, relying on descriptive naming and self-documenting code per the no-comments rule."
      output_matches_regex:
        - "^\\W*no\\b"

  - name: python_default_over_bash
    skill_path: CLAUDE.md
    prompt: "I need to write a script that parses JSON data and manages some state. Should I use bash or python?"
    model: haiku
    assertions:
      llm_judge:
        - "Recommends Python over bash for a script that parses JSON and manages state, per the Python-default rule."

  - name: test_first_principle
    skill_path: CLAUDE.md
    prompt: "A user reported a bug. What's the first thing I should do?"
    model: haiku
    assertions:
      llm_judge:
        - "Says the first step is to write a failing test that reproduces the reported bug before fixing it."

  - name: specific_file_staging
    skill_path: CLAUDE.md
    prompt: "I need to stage my changes for a commit. Can I use git add -A to stage everything?"
    model: haiku
    assertions:
      llm_judge:
        - "Says not to stage the whole tree at once and to stage specific files by name instead."
      output_not_contains:
        - "yes, git add -A is fine"

  - name: formatting_after_edits
    skill_path: CLAUDE.md
    prompt: "According to the project formatting rules, what commands should I run after editing a Python file?"
    model: haiku
    assertions:
      llm_judge:
        - "Says to format the edited file after editing a Python file, matching the project's format-edited-files step in the post-edit workflow."
