tests:
  - name: rebuild_is_primary_verification
    skill_path: agents/core_rules/core.md
    prompt: "How do I verify a .nix file change is correct?"
    model: haiku
    assertions:
      output_contains:
        - "rebuild"

  - name: rebuild_commit_then_rebuild_then_test
    skill_path: agents/core_rules/core.md
    prompt: "What is the correct order: test, rebuild, or commit first?"
    model: haiku
    assertions:
      output_contains:
        - "commit"
        - "rebuild"
        - "test"

  - name: rebuild_and_tests_both_gate_response
    skill_path: agents/core_rules/core.md
    prompt: "I edited a .nix file in the dotfiles repo. The rebuild succeeded but tests/run.sh failed. Can I tell the user the change is done?"
    model: haiku
    assertions:
      output_contains_any:
        - "no"
        - "not"
        - "fix"
        - "must"
        - "cannot"
        - "fail"
      output_not_contains:
        - "yes, you can"
        - "yes, it's done"
        - "go ahead and respond"

  - name: rebuild_untested_is_hypothesis
    skill_path: agents/core_rules/core.md
    prompt: "What is an unbuilt, untested change considered to be? Should it ever be presented to the user?"
    model: haiku
    assertions:
      output_contains_any:
        - "hypothesis"
        - "unverified"
        - "not a change"
        - "not complete"
        - "never present"
        - "not be presented"
        - "unacceptable"
        - "not verified"
        - "rebuilt and tested"
