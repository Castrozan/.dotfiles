tests:
  - name: nix_rebuild_trigger_fires_on_nix_edit
    description: "nix-rebuild-trigger emits mandatory rebuild message on .nix file edit"
    type: hook_test
    hook: nix-rebuild-trigger.py
    trigger:
      tool: Edit
      file_path: "test.nix"
    assertions:
      hook_blocks: false
      message_contains: "MANDATORY"

  - name: url_router_blocks_twitter_urls
    description: "url-to-skill-router blocks direct Twitter/X URL fetches"
    type: hook_test
    hook: url-to-skill-router.py
    trigger:
      tool: WebFetch
      url: "https://x.com/user/status/123"
    assertions:
      hook_blocks: true
      message_contains: "fxtwitter"
