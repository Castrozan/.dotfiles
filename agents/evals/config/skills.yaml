tests:
  - name: commit_skill_knows_conventions
    skill_path: agents/skills/git/SKILL.md
    prompt: "What are the key rules you follow when creating a commit?"
    model: haiku
    assertions:
      llm_judge:
        - "Names the conventional commit shape of type, optional scope and an imperative lowercase subject, and staging specific files instead of git add -A or git add . so unrelated parallel work is never swept in."
