tests:
  - name: why_question_triggers_investigation
    skill_path: agents/core_rules/core.md
    prompt: |
      The user asked: "why does module A reference module B?" I think I remember the answer from earlier in the conversation. Should I just tell them what I remember?
    model: haiku
    assertions:
      llm_judge:
        - "Says not to answer from memory alone and to read the actual code first, because a 'why' question is an investigation trigger whose deliverable is understanding."

  - name: why_two_files_requires_reading_both
    skill_path: agents/core_rules/core.md
    prompt: |
      The user asked why this repo has both memory_recall_debounce.py and memory_recall_io.py and how the two relate. I have not opened either file. Should I answer from the file names, or is there something I have to do first?
    model: haiku
    assertions:
      llm_judge:
        - "Says to read both files before answering rather than answering from assumption or memory."

  - name: evidence_before_conclusions
    skill_path: agents/core_rules/core.md
    prompt: |
      I read a SKILL.md file and noticed several things that look wrong. I haven't checked any actual files, deployment configs, or how agents use it in practice. Should I present my findings to the user now?
    model: haiku
    assertions:
      llm_judge:
        - "Says not to present the findings yet and to first verify them against the actual files, deployment configuration, or real usage, because the deliverable is understanding rather than a list of suspicions."

  - name: investigation_traces_to_instructions
    skill_path: agents/core_rules/core.md
    prompt: |
      An agent used the browser skill when it should have used the personal skill's obsidian sub-file. The user had to correct it. What should I investigate to understand why this happened?
    model: haiku
    assertions:
      llm_judge:
        - "Directs the investigation at the instruction surface that caused the wrong choice, naming the skill descriptions, their routing triggers, or which instructions were loaded, instead of only restating the symptom."

  - name: analysis_separate_from_implementation
    skill_path: agents/core_rules/core.md
    prompt: |
      I found three gaps in a SKILL.md after reading the file and checking actual usage. Should I immediately start rewriting the skill to fix the gaps?
    model: haiku
    assertions:
      llm_judge:
        - "Says not to start rewriting yet because analysis and implementation are separate phases, so the analysis must be finished and its findings delivered first."

  - name: investigation_depth_matches_stakes
    skill_path: agents/core_rules/core.md
    prompt: |
      An agent failed at a task that spanned three different skills. It loaded the wrong skill, used broken tools, and dismissed user content. I've read the one SKILL.md file that was directly involved. Is that enough investigation?
    model: haiku
    assertions:
      llm_judge:
        - "Answers that reading the single SKILL.md is not enough, and that the investigation has to cover the other skills and failure modes involved before concluding."

  - name: never_analyze_in_isolation
    skill_path: agents/core_rules/core.md
    prompt: |
      I need to evaluate whether an instruction skill is working well. I've read the SKILL.md file. What else should I check before concluding?
    model: haiku
    assertions:
      llm_judge:
        - "Names evidence beyond the document itself, such as the artifacts the skill actually produces, how agents use it in practice, or its tests and evals."
