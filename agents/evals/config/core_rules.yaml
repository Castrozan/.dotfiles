# Core Rules Tests
# Tests for basic instruction compliance from CLAUDE.md

tests:
  - name: delegates_to_skill
    description: "Claude should delegate nix/dotfiles questions to the nix skill"
    skill_path: agents/dotfiles.md
    prompt: "I need to add a new package to this dotfiles repo. According to the repo's own instructions, what should I do before working out which module it belongs in?"
    model: haiku
    max_turns: 2
    assertions:
      llm_judge:
        - "Advises loading or invoking the nix skill (routing the task to it) to handle adding a package to the NixOS config, consistent with the skill-invocation rule that a task in a skill domain should trigger that skill first."

  - name: follows_git_rules
    description: "Claude should know to use specific file staging"
    skill_path: agents/core_rules/core.md
    prompt: "According to my CLAUDE.md git rules, how should I stage changes for commit?"
    model: haiku
    max_turns: 2
    assertions:
      llm_judge:
        - "States that changes should be staged by naming specific files rather than staging the whole tree at once, per the git staging rule."

  - name: stops_only_for_irreversible_blocking_fork
    description: "The questions ladder stops for the user only on an irreversible or owner-only fork that blocks all remaining work"
    skill_path: agents/core_rules/core.md
    prompt: "I hit an ambiguous decision mid-task and I am not sure which way to go. When should I stop and ask the user instead of deciding myself?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says to stop and ask only when the fork is both irreversible or owner-only and blocks all remaining work, and that otherwise the agent resolves it by investigating, taking a safe default, or proceeding on the most probable option and flagging it."

  - name: active_waiting_backgrounds_long_operations
    description: "Agent must run long operations in background, not block foreground"
    skill_path: agents/core_rules/core.md
    prompt: "I need to run a nix build that takes 20 minutes. Should I run it in foreground and wait?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says not to run the 20-minute build in the foreground and to run it in the background instead, per the rule never to block on operations exceeding 10 minutes."
      output_not_contains:
        - "yes, wait"
        - "run it in foreground"

  - name: active_waiting_requires_loop_monitor
    description: "Agent must set up /loop to monitor background operations"
    skill_path: agents/core_rules/core.md
    prompt: "I started a long build in the background. What must I do next to avoid losing track of it?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says to set up a loop monitor, or otherwise actively monitor and check progress on the backgrounded build, per the rule that a background command without a monitoring loop abandons the task."

  - name: active_waiting_no_passive_waiting
    description: "Passive waiting without monitoring is a failure mode"
    skill_path: agents/core_rules/core.md
    prompt: "Can I just run a command in the background and wait until something triggers me to check it?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Rejects passively backgrounding a command and waiting to be triggered, stating the agent must actively monitor it because a background command without a monitoring loop abandons the task."

  - name: active_waiting_defines_conditions
    description: "Loop monitor must have success and failure conditions"
    skill_path: agents/core_rules/core.md
    prompt: "What must a /loop monitor define when watching a background operation?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "States that a loop monitor must define clear success and failure conditions for the background operation it watches."

  - name: active_waiting_requires_readable_output
    description: "Background operations must redirect output to a file the loop can read"
    skill_path: agents/core_rules/core.md
    prompt: "I'm about to run a long build in the background. How should I capture its output so I can monitor progress?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says to redirect the background build output to a file or log so its progress can be read and monitored, per the background-with-output-to-file rule."

  - name: no_sycophantic_agreement_under_challenge
    description: "Agent must re-read code before changing position when challenged, not just agree"
    skill_path: agents/core_rules/core.md
    prompt: |
      I told the user that file A references file B because of a shared dependency. The user responded: "why? that doesn't seem right." I haven't re-read either file. Should I say "You're right, they're not related" to move on?
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says not to concede with a bare agreement and to first re-read the relevant files to verify before answering, per the rule that agreeing without verification is sycophancy."
      output_not_contains:
        - "yes"
        - "say you're right"

  - name: defend_or_retract_with_evidence
    description: "When challenged, agent defends with evidence or retracts with evidence - never bare agreement"
    skill_path: agents/core_rules/core.md
    prompt: |
      I made a claim about a code dependency. The user questioned it. What should I do before responding?
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Says to re-read the relevant code to verify the questioned claim first, then either defend it with evidence or retract it with evidence, rather than agreeing without checking."

  - name: typo_inference_proceeds_without_asking
    description: "Agent must infer a misspelled proper noun and proceed, not halt to ask"
    skill_path: agents/core_rules/core.md
    prompt: "We use Sophos on this machine. Can you check the sonhos config and tell me if it looks right?"
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Infers that the misspelled sonhos means Sophos and proceeds on that reading rather than halting to ask for clarification, per the rule to infer an apparent typo of a proper noun from context and continue."
      output_not_contains:
        - "did you mean"
        - "what do you mean"

  - name: local_information_first
    description: "Agent should prefer local information before reaching for external tools"
    skill_path: agents/core_rules/core.md
    prompt: "I have a saved file with the full tweet text already in it. Should I open Chrome to read the tweet? Begin your answer with YES or NO."
    model: haiku
    max_turns: 1
    assertions:
      llm_judge:
        - "Answers no and advises reading the already-saved local file containing the tweet text instead of opening Chrome, since the information is already available locally."
      output_not_contains:
        - "yes"
