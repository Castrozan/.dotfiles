tests:
  - name: dotfiles_directory_structure
    skill_path: agents/skills/nix/SKILL.md
    extra_skill_paths:
      - agents/skills/nix/repo.md
    prompt: "Where should I put a new home-manager module in this dotfiles repo?"
    model: haiku
    assertions:
      llm_judge:
        - "Places the module under the shared home module directories, naming the base directory for configuration shared across platforms and the linux or darwin sibling only for platform-specific pieces, as a single file or a directory with a default entry point."

  - name: dotfiles_isnixos_detection
    skill_path: agents/skills/nix/SKILL.md
    extra_skill_paths:
      - agents/skills/nix/repo.md
    prompt: "How do I conditionally enable something only on NixOS in this repo?"
    model: haiku
    assertions:
      llm_judge:
        - "Says to consume the injected isNixOS argument in the module's function arguments and guard the option with lib.mkIf, rather than probing the filesystem for a NixOS marker."

  - name: nix_explains_lazy_evaluation_and_fixed_points
    skill_path: agents/skills/nix/SKILL.md
    extra_skill_paths:
      - agents/skills/nix/repo.md
      - agents/skills/nix/expert.md
    prompt: "I need help understanding Nix lazy evaluation and fixed-points. Can you explain?"
    model: haiku
    assertions:
      llm_judge:
        - "Explains lazy evaluation as expressions being evaluated only when their value is demanded, and fixed-points as a self-referential definition whose own result is fed back into its construction, which is what lets overlays and the module system extend a set."
