tests:
  - name: quickshell_knows_ipc_for_overview
    skill_path: agents/skills/quickshell/SKILL.md
    prompt: "How do I toggle the workspace overview on and off?"
    model: haiku
    assertions:
      llm_judge:
        - "Gives an IPC call against the overview service that toggles it, and passes the any-display flag rather than relying on the default display filter."

  - name: quickshell_knows_overview_config_location
    skill_path: agents/skills/quickshell/SKILL.md
    prompt: "Where is the overview configuration file?"
    model: haiku
    assertions:
      llm_judge:
        - "Points at the config.json inside the quickshell overview config directory as the place where the grid configuration lives."

  - name: quickshell_knows_service_restart
    skill_path: agents/skills/quickshell/SKILL.md
    prompt: "The overview is not reflecting my QML changes. What should I do?"
    model: haiku
    assertions:
      llm_judge:
        - "Says to rebuild so the nix-managed config symlinks regenerate and then restart the quickshell service through systemctl, and does not suggest killing the quickshell process."

  - name: quickshell_knows_theme_integration
    skill_path: agents/skills/quickshell/SKILL.md
    prompt: "How does the overview get its colors?"
    model: haiku
    assertions:
      llm_judge:
        - "Says the overview reads its colors from the hypr-theme colors json through a watched file view, so they update automatically when the theme changes."

  - name: quickshell_knows_bar_ipc
    skill_path: agents/skills/quickshell/SKILL.md
    prompt: "How do I trigger the dashboard popout from the bar?"
    model: haiku
    assertions:
      llm_judge:
        - "Gives an IPC call against the bar service that toggles the dashboard, and passes the any-display flag rather than relying on the default display filter."
