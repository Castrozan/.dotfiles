tests:
  - name: commit_uses_specific_staging
    skill_path: agents/skills/git/SKILL.md
    prompt: "Should I use git add -A to stage all my changes before committing?"
    model: haiku
    assertions:
      output_contains_any:
        - "specific"
        - "git add"
        - "individual"
        - "each file"
        - "by name"
        - "never"
        - "avoid"
        - "don't"
        - "not"

  - name: commit_reads_diff_first
    skill_path: agents/skills/git/SKILL.md
    prompt: "What information do you need before writing a commit message?"
    model: haiku
    assertions:
      output_contains_any:
        - "diff"
        - "changes"
        - "status"
        - "log"

  - name: commit_conventional_format
    skill_path: agents/skills/git/SKILL.md
    prompt: "What format should commit messages follow?"
    model: haiku
    assertions:
      output_contains_any:
        - "conventional"
        - "type"
        - "scope"
        - "imperative"

  - name: git_history_never_uses_repeated_grep
    skill_path: agents/skills/git/SKILL.md
    prompt: "I need to search git history for all commits related to authentication. How should I do it?"
    model: haiku
    assertions:
      output_contains_any:
        - "dump"
        - "git-history"
        - "/tmp"
        - "layer"

  - name: git_history_file_paths_are_high_signal
    skill_path: agents/skills/git/SKILL.md
    prompt: "What's the advantage of searching file paths in layer 1 over commit messages?"
    model: haiku
    assertions:
      output_contains_any:
        - "file path"
        - "directory"
        - "terse"
        - "miss"
        - "keyword"

  - name: git_history_knows_when_not_to_use
    skill_path: agents/skills/git/SKILL.md
    prompt: "I just want to see the last commit. Should I use this skill?"
    model: haiku
    assertions:
      output_contains_any:
        - "no"
        - "git log"
        - "git show"
        - "don't need"
        - "overkill"
        - "simple"
        - "skip"

  - name: git_history_cache_invalidation
    skill_path: agents/skills/git/SKILL.md
    prompt: "How do I know if the cached git history file is still up to date?"
    model: haiku
    assertions:
      output_contains_any:
        - "HEAD"
        - "stale"
        - "hour"
        - "invalidat"
        - "force"
        - "info"
