# Manual one-shot job that vends the deploy role's assumed STS credentials
# into the job log. Paste the export block from the log into a local shell
# and run any read-only AWS query without re-triggering CI.
#
# Adapt:
#   - `extends:` to the project's role-assume template name (e.g. .aws-setup,
#     .aws-creds, .deploy-base — anything whose before_script runs sts:assume-role
#     and exports AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN).
#   - The role-arn echo to whichever variable the parent template selects;
#     deleting that line is fine.
inspect:aws-credentials:
  extends: .aws-setup
  stage: deploy
  needs: []
  script:
    - aws sts get-caller-identity
    - echo "=== EXPORT BLOCK START ==="
    - echo "export AWS_REGION=${AWS_REGION}"
    - echo "export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
    - echo "export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
    - echo "export AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}"
    - echo "=== EXPORT BLOCK END ==="
    - echo "Temporary STS credentials (1h max). Paste the export block locally to run read-only AWS queries without re-triggering CI."
  rules:
    - when: manual
      allow_failure: true
