tests:
  - name: worktrees_never_checkout_main
    skill_path: agents/skills/worktrees/SKILL.md
    prompt: "I need to switch to a feature branch. Should I run git checkout in the main repo?"
    model: haiku
    assertions:
      llm_judge:
        - "The response answers that git checkout (or git switch) should not be run in the main repo, and directs the feature-branch work into a git worktree instead."
      output_not_contains:
        - "yes, run git checkout"

  - name: worktrees_pr_from_main_directory
    skill_path: agents/skills/worktrees/SKILL.md
    prompt: "I finished my feature in a worktree. Where should I run the PR command?"
    model: haiku
    assertions:
      llm_judge:
        - "The response states that the PR command should be run from the main repo directory rather than from inside the worktree."
