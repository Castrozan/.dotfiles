[pytest]
addopts = -ra --strict-markers --strict-config
xfail_strict = true
norecursedirs = .git node_modules private-config result result-* .deep-work .direnv .worktrees __pycache__ *.egg build dist venv
python_files = test_*.py
markers =
    workspace_switcher_integration: live-daemon integration tests that talk to the running workspace-window-switcher daemon
filterwarnings =
    error
